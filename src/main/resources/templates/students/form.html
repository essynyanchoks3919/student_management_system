<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Student Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .form-card { border: none; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); background: #ffffff; }
        .form-label { font-weight: 600; font-size: 0.875rem; color: #475569; margin-bottom: 0.5rem; }
        .form-control, .form-select {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background-color: #fcfdfe;
        }
        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background-color: #fff;
        }
        .btn-save { background-color: #4f46e5; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; transition: all 0.2s; }
        .btn-save:hover { background-color: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
        .btn-cancel { background-color: #f1f5f9; color: #475569; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; }
        .btn-cancel:hover { background-color: #e2e8f0; color: #1e293b; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 1.5rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">

            <a href="/students" class="text-decoration-none text-muted mb-4 d-inline-block hover-translate">
                <i class="fas fa-arrow-left me-2"></i> Back to Directory
            </a>

            <div class="form-card p-4 p-md-5">
                <div class="mb-5">
                    <h2 class="fw-bold text-dark mb-1" th:text="${pageTitle}">Student Form</h2>
                    <p class="text-muted">Fill in the details below to <span th:text="${isEdit ? 'update the' : 'register a new'}"></span> student profile.</p>
                </div>

                <form th:action="${!isEdit} ? @{/students/save} : @{/students/update/{id}(id=${student.studentId})}"
                      th:object="${student}"
                      method="post" class="needs-validation">

                    <input type="hidden" th:field="*{studentId}" />

                    <div class="section-title">Personal Information</div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" th:field="*{firstName}" placeholder="e.g. Jane" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" th:field="*{lastName}" placeholder="e.g. Doe" required>
                        </div>
                    </div>

                    <div class="section-title">Contact & Status</div>

                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" th:field="*{email}" placeholder="jane.doe@university.edu" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-5">
                        <div class="col-md-7">
                            <label class="form-label">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-phone"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" th:field="*{phoneNumber}" placeholder="+1 (555) 000-0000">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="department" class="form-label">Department</label>
                            <select th:field="*{department}" class="form-select" id="department" required>
                                <option value="" disabled selected>Select Department</option>
                                <option th:each="dept : ${departments}"
                                        th:value="${dept.departmentId}"
                                        th:text="${dept.name}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Account Status</label>
                            <select class="form-select" th:field="*{status}">
                                <option th:each="status : ${T(com.universitymanagementproject.studentmanagementsystem.entity.Student.StudentStatus).values()}"
                                        th:value="${status}" th:text="${status}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center pt-3 border-top">
                        <a href="/students" class="btn btn-cancel">Cancel</a>
                        <button type="submit" class="btn btn-primary btn-save px-5">
                            <i class="fas fa-save me-2"></i> Save Record
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
