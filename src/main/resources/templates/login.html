<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduSmart SMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            /* Subtle background pattern for a premium feel */
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            background: #ffffff;
            overflow: hidden;
        }
        .login-header {
            padding: 40px 40px 20px;
            text-align: center;
        }
        .icon-box {
            width: 64px;
            height: 64px;
            background: #f5f3ff;
            color: var(--primary-color);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.5rem;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #475569;
        }
        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .input-group-text {
            background-color: #f8fafc;
            border-color: #e2e8f0;
            color: #94a3b8;
            border-radius: 10px 0 0 10px;
        }
        .btn-login {
            background-color: var(--primary-color);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }
        .demo-box {
            background-color: #f1f5f9;
            border-radius: 12px;
            padding: 15px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div class="card login-card">
                <div class="login-header">
                    <div class="icon-box">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <h4 class="fw-bold text-dark">Welcome Back</h4>
                    <p class="text-muted small">Enter your credentials to access the SMS portal</p>
                </div>

                <div class="card-body px-4 pb-5">
                    <div th:if="${param.error}" class="alert alert-danger border-0 small mb-4 py-2">
                        <i class="fas fa-exclamation-circle me-2"></i> Invalid credentials.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-info border-0 small mb-4 py-2">
                        <i class="fas fa-info-circle me-2"></i> Logged out successfully.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="text" class="form-control" id="username" name="username" placeholder="admin@example.com" required autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label for="password" class="form-label">Password</label>
                                <a href="#" class="text-primary text-decoration-none small fw-medium">Forgot?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="mb-4 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                                <label class="form-check-label text-muted small" for="remember-me">Stay signed in</label>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-login text-white">
                                Sign In <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </form>

                    <div class="mt-5 demo-box border border-light">
                        <div class="fw-bold mb-1 text-dark"><i class="fas fa-flask me-1"></i> Demo Access</div>
                        <div>Email: <span class="text-dark fw-medium">admin@example.com</span></div>
                        <div>Pass: <span class="text-dark fw-medium">admin123</span></div>
                    </div>
                </div>
            </div>

            <p class="text-center text-muted mt-4 small">
                &copy; 2026 EduSmart University Systems
            </p>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
