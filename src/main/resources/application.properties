spring.application.name=studentmanagementsystem



 #Database Configuration (Optimized for XAMPP/MySQL)
## Added 'createDatabaseIfNotExist' so the user doesn't have to manualy create 'university_sms'
spring.datasource.url=jdbc:mysql://localhost:3306/university_sms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1111
#
## JPA / Hibernate Settings
## 'update' will create tables automatically based on your Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
#
## Development Settings
spring.thymeleaf.cache=false

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

